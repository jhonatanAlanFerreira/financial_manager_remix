type ClassificationBreakdown {
  name: String!
  amount: Float!
}

type MonthData {
  month: String!
  income: Float!
  expense: Float!
  net: Float!
  monthlyExpenses: [ClassificationBreakdown!]!
  monthlyIncomes: [ClassificationBreakdown!]!
}

type YearData {
  year: Int!
  income: Float!
  expense: Float!
  net: Float!
  months: [MonthData!]!
}

type ChartTransactionData {
  availableYears: [Int!]!
  data: [YearData!]!
}

enum TransactionType {
  PERSONAL_ONLY
  COMPANY_ONLY
  ALL
}
